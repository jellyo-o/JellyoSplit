services:
  app:
    build: .
    ports:
      - "${EXTERNAL_PORT:-3000}:4000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://gathersplit:${DB_PASSWORD}@db:5432/gathersplit
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gathersplit
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gathersplit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gathersplit"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
